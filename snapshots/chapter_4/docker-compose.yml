services:
  data-service:
    build: ./data-service
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      APCA-API-KEY-ID: ${APCA-API-KEY-ID:-}
      APCA_API_SECRET_KEY: ${APCA_API_SECRET_KEY:-}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL_PROD: ${DATABASE_URL_PROD:?DATABASE_URL_PROD is required - set it in src/.env (see src/.env.example)}
      DATABASE_URL_TEST: ${DATABASE_URL_TEST:?DATABASE_URL_TEST is required - set it in src/.env (see src/.env.example)}
      DATA_SERVICE_URL: http://data-service:8000
      DB_ENV: ${DB_ENV:-test}
      RESEED_TEST_DB: ${RESEED_TEST_DB:-false}
    depends_on:
      data-service:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8080
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8080
    depends_on:
      - backend
